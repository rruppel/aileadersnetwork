  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fy-content:space-between;align-items:center;\">\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:26px;letter-spacing:0.24em;text-transform:uppercase;color:#c8a96a;font-weight:500;\">Rede privada · Brasil<\u002Fspan>\n      <span style=\"display:flex;align-items:center;gap:14px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#5f6675;\"><span style=\"width:11px;height:11px;border-radius:999px;background:#c8a96a;display:inline-block;\"><\u002Fspan>est. 2026<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-direction:column;gap:40px;max-width:1400px;\">\n      <h1 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:148px;line-height:0.96;letter-spacing:-0.03em;margin:0;color:#f5f3ee;\">AI Leaders<br><span style=\"color:#c8a96a;\">Network<\u002Fspan><\u002Fh1>\n      <div style=\"width:120px;height:3px;background:#c8a96a;\"><\u002Fdiv>\n      <p style=\"font-family:'Hanken Grotesk',sans-serif;font-size:40px;line-height:1.4;color:#c2c7d0;margin:0;max-width:1080px;text-wrap:pretty;\">A comunidade privada dos profissionais que estão transformando empresas através da Inteligência Artificial.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(245,243,238,0.10);border:1px solid rgba(245,243,238,0.10);\">\n      <div style=\"background:#0a0e14;padding:30px 34px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#f5f3ee;\">Aprender<\u002Fdiv>\n      <div style=\"background:#0a0e14;padding:30px 34px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#f5f3ee;\">Conectar<\u002Fdiv>\n      <div style=\"background:#0a0e14;padding:30px 34px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#f5f3ee;\">Implementar<\u002Fdiv>\n      <div style=\"background:#0a0e14;padding:30px 34px;font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#c8a96a;\">Gerar negócios<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 02 — O PROBLEMA ============ -->\n  <section data-label=\"O Problema\" data-screen-label=\"02 Problema\" data-speaker-notes=\"Todos falam de IA, poucos implementam. Liste as dores reais que os profissionais enfrentam. A informação existe, mas a experiência prática está dispersa.\" style=\"background:#0a0e14;color:#f5f3ee;font-family:'Hanken Grotesk',system-ui,sans-serif;padding:90px 120px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(245,243,238,0.10);padding-bottom:24px;\">\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:26px;letter-spacing:0.2em;text-transform:uppercase;color:#c8a96a;font-weight:500;\">02 — O Problema<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#4f5663;\">AI Leaders Network<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:48px;\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:500;font-size:60px;line-height:1.08;letter-spacing:-0.02em;margin:0;max-width:1500px;text-wrap:balance;\">Todos falam sobre IA. <span style=\"color:#c8a96a;\">Poucos estão realmente implementando.<\u002Fspan><\u002Fh2>\n\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(245,243,238,0.10);border:1px solid rgba(245,243,238,0.10);\">\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">01<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não sabem por onde começar<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">02<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não conhecem casos reais<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">03<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não têm acesso a especialistas confiáveis<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">04<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não sabem quais fornecedores contratar<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">05<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não sabem como medir ROI<\u002Fspan><\u002Fdiv>\n        <div style=\"background:#0a0e14;padding:32px 30px;display:flex;flex-direction:column;gap:16px;\"><span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;color:#c8a96a;\">06<\u002Fspan><span style=\"font-size:30px;line-height:1.35;color:#d8dce2;\">Não têm com quem trocar experiências<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"font-size:30px;line-height:1.5;color:#8b93a3;margin:0;\">A informação está em todo lugar. <span style=\"color:#d8dce2;\">A experiência prática está dispersa.<\u002Fspan><\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 03 — A OPORTUNIDADE ============ -->\n  <section data-label=\"A Oportunidade\" data-screen-label=\"03 Oportunidade\" data-speaker-notes=\"O mercado vai escalar rápido nos próximos anos. Mas não existe hoje uma rede confiável conectando todos os atores do ecossistema.\" style=\"background:#0a0e14;color:#f5f3ee;font-family:'Hanken Grotesk',system-ui,sans-serif;padding:90px 120px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;justify-content:space-between;align-items:baseline;border-bottom:1px solid rgba(245,243,238,0.10);padding-bottom:24px;\">\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:26px;letter-spacing:0.2em;text-transform:uppercase;color:#c8a96a;font-weight:500;\">03 — A Oportunidade<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',ui-monospace,monospace;font-size:24px;letter-spacing:0.18em;text-transform:uppercase;color:#4f5663;\">AI Leaders Network<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:46px;\">\n      <div style=\"display:flex;flex-direction:column;gap:28px;\">\n        <span style=\"font-family:'Space Grotesk',sans-serif;font-size:34px;font-weight:500;color:#f5f3ee;\">Nos próximos anos<\u002Fspan>\n        <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(245,243,238,0.10);border:1px solid rgba(245,243,238,0.10);\">\n          <div style=\"background:#0a0e14;padding:30px 28px;display:flex;flex-direction:column;gap:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;color:#c8a96a;letter-spacing:-0.02em;\">Milhares<\u002Fspan><span style=\"font-size:27px;line-height:1.35;color:#aab0bb;\">de empresas precisarão implementar IA<\u002Fspan><\u002Fdiv>\n          <div style=\"background:#0a0e14;padding:30px 28px;display:flex;flex-direction:column;gap:14px;\"><span style=\"font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:600;color:#c8a96a;letter-spacing:-
